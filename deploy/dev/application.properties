# MSR Configuration - Development Environment
# This file is mounted into the MSR container at runtime

# ── Server Settings ───────────────────────────────────────────────────────────
settings.watt.server.threadPool=50
settings.watt.server.threadPoolMin=10

# ── Logging ───────────────────────────────────────────────────────────────────
settings.watt.debug.level=Info
settings.watt.server.audit=true

# ── Session Timeout ───────────────────────────────────────────────────────────
settings.session.timeout=30

# ── Development-specific settings ─────────────────────────────────────────────
# Enable package reload without restart (dev only)
settings.watt.server.package.reloadOnChange=true

# Extended session timeout for development
settings.watt.server.session.timeout=60


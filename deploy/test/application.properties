# MSR Configuration - Test Environment
# This file is mounted into the MSR container at runtime

# ── Server Settings ───────────────────────────────────────────────────────────
settings.watt.server.threadPool=100
settings.watt.server.threadPoolMin=25

# ── Logging ───────────────────────────────────────────────────────────────────
settings.watt.debug.level=Warn
settings.watt.server.audit=true

# ── Session Timeout ───────────────────────────────────────────────────────────
settings.session.timeout=20

# ── Test-specific settings ────────────────────────────────────────────────────
# Disable package reload in test environment
settings.watt.server.package.reloadOnChange=false

# Standard session timeout for testing
settings.watt.server.session.timeout=30


# MSR Configuration - Production Environment
# This file is mounted into the MSR container at runtime

# ── Server Settings ───────────────────────────────────────────────────────────
settings.watt.server.threadPool=200
settings.watt.server.threadPoolMin=50

# ── Logging ───────────────────────────────────────────────────────────────────
settings.watt.debug.level=Error
settings.watt.server.audit=true

# ── Session Timeout ───────────────────────────────────────────────────────────
settings.session.timeout=15

# ── Production-specific settings ──────────────────────────────────────────────
# Disable package reload in production
settings.watt.server.package.reloadOnChange=false

# Strict session timeout for production
settings.watt.server.session.timeout=20

# Enable production monitoring
settings.watt.server.monitoring.enabled=true

